<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>e-zvířátka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="lang-switcher"></div>
  <main id="app"></main>
  <button id="btn-dev-reset" title="Reset game (test)" aria-label="Reset game">🔄</button>
  <div id="reset-confirm" role="dialog" aria-modal="true" aria-label="Confirm reset" style="display:none">
    <div id="reset-confirm-box">
      <p>Opravdu chceš smazat celý postup?<br><span style="font-size:11px;opacity:0.7">Really delete all progress?</span></p>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
        <button id="btn-reset-yes">✅ Ano</button>
        <button id="btn-reset-no">❌ Ne</button>
      </div>
    </div>
  </div>
  <script src="js/analytics.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/animals.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/game.js" defer></script>
  <script src="js/app.js" defer></script>
  <!-- Google Analytics — nahraď G-XXXXXXXXXX svým Measurement ID z analytics.google.com -->
  <!-- Prevent double-tap zoom on iOS 16+ (ignores user-scalable=no) -->
  <script>
    (function() {
      var lastTap = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
      }, { passive: false });
    })();
  </script>
  <!-- Google Analytics — nahraď G-XXXXXXXXXX svým Measurement ID z analytics.google.com -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</body>
</html>
